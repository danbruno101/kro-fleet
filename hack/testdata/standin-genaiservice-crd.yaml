# Stand-in for the GenAIService CRD that stock kro creates on members when the
# sister repo's ResourceGraphDefinition is installed
# (https://github.com/danbruno101/kro-genaiops-demo). Used to test the
# placement controller's mechanics without a full kro install: same
# group/version/kind, opaque spec, status subresource so tests can simulate
# kro's status.state transitions.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: genaiservices.kro.run
spec:
  group: kro.run
  names:
    kind: GenAIService
    listKind: GenAIServiceList
    plural: genaiservices
    singular: genaiservice
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
