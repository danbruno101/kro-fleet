# One GenAIService, authored once on the hub, placed onto every member whose
# ClusterProfile carries tier=prod. template.spec is the sister repo's
# developer-facing GenAIService spec, passed through verbatim — stock kro on
# each member expands it into PVC/Deployment/Service(s), resolving the
# per-cloud StorageClass from that member's ClusterPlatform config. The
# developer YAML never names a cluster or a cloud.
apiVersion: fleet.kro.run/v1alpha1
kind: FleetGenAIService
metadata:
  name: demo-llm
  namespace: fleet-demo
spec:
  placement:
    clusterSelector:
      matchLabels:
        tier: prod
    tolerance:
      minReadyClusters: 1
  template:
    spec:
      name: demo-llm
      model: "Qwen/Qwen2.5-0.5B-Instruct"
      mode: mock          # CPU-only mock server; flip to "gpu" on real clusters
      replicas: 1
      cacheSize: 1Gi
      monitoring: true
