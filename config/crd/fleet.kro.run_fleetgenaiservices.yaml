---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: fleetgenaiservices.fleet.kro.run
spec:
  group: fleet.kro.run
  names:
    kind: FleetGenAIService
    listKind: FleetGenAIServiceList
    plural: fleetgenaiservices
    shortNames:
    - fgs
    singular: fleetgenaiservice
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.summary.placed
      name: Placed
      type: integer
    - jsonPath: .status.summary.ready
      name: Ready
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          FleetGenAIService is one GenAIService authored once on the hub and placed
          onto every member cluster matching the placement selector.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              FleetGenAIServiceSpec defines the desired state: which GenAIService to
              place, and where.
            properties:
              placement:
                description: Placement selects member clusters from the ClusterProfile
                  inventory.
                properties:
                  clusterSelector:
                    description: |-
                      ClusterSelector selects ClusterProfile objects by label. An empty
                      selector matches no clusters (explicit opt-in, no accidental
                      fleet-wide blast).
                    properties:
                      matchExpressions:
                        description: matchExpressions is a list of label selector
                          requirements. The requirements are ANDed.
                        items:
                          description: |-
                            A label selector requirement is a selector that contains values, a key, and an operator that
                            relates the key and values.
                          properties:
                            key:
                              description: key is the label key that the selector
                                applies to.
                              type: string
                            operator:
                              description: |-
                                operator represents a key's relationship to a set of values.
                                Valid operators are In, NotIn, Exists and DoesNotExist.
                              type: string
                            values:
                              description: |-
                                values is an array of string values. If the operator is In or NotIn,
                                the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                the values array must be empty. This array is replaced during a strategic
                                merge patch.
                              items:
                                type: string
                              type: array
                              x-kubernetes-list-type: atomic
                          required:
                          - key
                          - operator
                          type: object
                        type: array
                        x-kubernetes-list-type: atomic
                      matchLabels:
                        additionalProperties:
                          type: string
                        description: |-
                          matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                          map is equivalent to an element of matchExpressions, whose key field is "key", the
                          operator is "In", and the values array contains only "value". The requirements are ANDed.
                        type: object
                    type: object
                    x-kubernetes-map-type: atomic
                  tolerance:
                    description: |-
                      Tolerance controls how partial failure folds into the rolled-up
                      Ready condition.
                    properties:
                      minReadyClusters:
                        description: |-
                          MinReadyClusters is the number of placed clusters that must report
                          ready for the FleetGenAIService's Ready condition to be True.
                          Unset means "all placed clusters".
                        format: int32
                        minimum: 0
                        type: integer
                    type: object
                required:
                - clusterSelector
                type: object
              template:
                description: |-
                  Template is the GenAIService to materialize on each selected member
                  cluster. The placed object gets the same namespace/name as this
                  FleetGenAIService.
                properties:
                  spec:
                    description: |-
                      Spec is the GenAIService spec, passed through verbatim to each
                      member. It is intentionally unvalidated here: its schema is owned by
                      the members' ResourceGraphDefinition (stock kro).
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                required:
                - spec
                type: object
            required:
            - placement
            - template
            type: object
          status:
            description: |-
              FleetGenAIServiceStatus is the fleet view aggregated back onto the hub
              object.
            properties:
              clusters:
                description: |-
                  Clusters holds one entry per member the object is (or was last)
                  placed on. This doubles as the PoC's applied-manifest inventory:
                  members listed here are exactly those the controller must clean up
                  on unplacement or deletion (see docs/KEP-GAP.md).
                items:
                  description: ClusterStatus is the per-member slice of the fleet
                    view.
                  properties:
                    message:
                      description: |-
                        Message carries a human-oriented note (e.g. why not ready, or that
                        the member is unreachable).
                      type: string
                    name:
                      description: Name is the ClusterProfile name (unique within
                        the fleet namespace).
                      type: string
                    ready:
                      description: |-
                        Ready reports whether the placed GenAIService is ready on this
                        member (kro instance state ACTIVE or a true Ready condition).
                      type: boolean
                  required:
                  - name
                  - ready
                  type: object
                type: array
              conditions:
                description: |-
                  Conditions holds the rolled-up conditions; Ready is computed from
                  per-member readiness and spec.placement.tolerance.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                description: ObservedGeneration is the spec generation last acted
                  upon.
                format: int64
                type: integer
              summary:
                description: Summary counts placements for quick fleet-level reading.
                properties:
                  placed:
                    description: Placed is the number of members the object is currently
                      applied to.
                    format: int32
                    type: integer
                  ready:
                    description: Ready is the number of those members reporting ready.
                    format: int32
                    type: integer
                required:
                - placed
                - ready
                type: object
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
